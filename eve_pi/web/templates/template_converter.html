{% extends "base.html" %}

{% block title %}Template Converter - EVE PI Optimizer{% endblock %}

{% block content %}
<h2>Template Converter</h2>

<div class="panel">
    <div class="panel-header">Input</div>

    <label for="template_json">Template JSON</label>
    <textarea id="template_json" rows="12" placeholder='Paste your PI template JSON here...'></textarea>

    <div class="form-row">
        <div>
            <label for="to_planet_type">Target Planet Type (optional)</label>
            <select id="to_planet_type">
                <option value="">-- No Change --</option>
                {% for pt in planet_types %}
                <option value="{{ pt }}">{{ pt }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="to_product">Target Product (optional)</label>
            <select id="to_product">
                <option value="">-- No Change --</option>
                {% for prod in products %}
                <option value="{{ prod }}">{{ prod }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <button type="button" class="btn btn-success" onclick="convertTemplate()">Convert Template</button>
</div>

<div class="panel" id="resultPanel" style="display: none;">
    <div class="panel-header">
        Result
        <button type="button" class="btn btn-sm" onclick="copyResult()" style="float: right; margin-top: -5px;">
            Copy JSON
        </button>
    </div>
    <div id="resultError" class="error-box" style="display: none;"></div>
    <pre id="resultJson" style="
        background: #0a0a1a;
        border: 1px solid #2a2a4a;
        border-radius: 3px;
        padding: 15px;
        overflow-x: auto;
        color: #c8c8d4;
        font-size: 13px;
        white-space: pre-wrap;
        word-wrap: break-word;
        display: none;
    "></pre>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function convertTemplate() {
        const templateJson = document.getElementById('template_json').value.trim();
        const toPlanetType = document.getElementById('to_planet_type').value;
        const toProduct = document.getElementById('to_product').value;

        if (!templateJson) {
            showError('Please paste a template JSON first.');
            return;
        }

        // Validate JSON client-side
        try {
            JSON.parse(templateJson);
        } catch (e) {
            showError('Invalid JSON: ' + e.message);
            return;
        }

        if (!toPlanetType && !toProduct) {
            showError('Select at least a target planet type or product.');
            return;
        }

        const formData = new FormData();
        formData.append('template_json', templateJson);
        formData.append('to_planet_type', toPlanetType);
        formData.append('to_product', toProduct);

        try {
            const response = await fetch('/template/convert', {
                method: 'POST',
                body: formData,
            });
            const data = await response.json();

            const panel = document.getElementById('resultPanel');
            const errorDiv = document.getElementById('resultError');
            const jsonPre = document.getElementById('resultJson');
            panel.style.display = 'block';

            if (data.error) {
                showError(data.error);
            } else {
                errorDiv.style.display = 'none';
                jsonPre.style.display = 'block';
                jsonPre.textContent = JSON.stringify(data.result, null, 2);
            }
        } catch (e) {
            showError('Request failed: ' + e.message);
        }
    }

    function showError(msg) {
        const panel = document.getElementById('resultPanel');
        const errorDiv = document.getElementById('resultError');
        const jsonPre = document.getElementById('resultJson');
        panel.style.display = 'block';
        errorDiv.style.display = 'block';
        errorDiv.textContent = msg;
        jsonPre.style.display = 'none';
    }

    function copyResult() {
        const jsonPre = document.getElementById('resultJson');
        const text = jsonPre.textContent;
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = original; }, 1500);
        });
    }
</script>
{% endblock %}
