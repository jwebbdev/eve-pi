<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EVE PI Optimizer{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d1a;
            color: #c8c8d4;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            color: #4fc3f7;
            text-decoration: none;
        }
        a:hover {
            color: #81d4fa;
            text-decoration: underline;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            border-bottom: 1px solid #2a2a4a;
            padding: 15px 0;
            margin-bottom: 30px;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #4fc3f7;
            font-size: 20px;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header nav a {
            margin-left: 25px;
            color: #8888aa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        header nav a:hover {
            color: #4fc3f7;
            text-decoration: none;
        }

        h2 {
            color: #4fc3f7;
            font-size: 16px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1a1a3e;
        }

        h3 {
            color: #80cbc4;
            font-size: 14px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .panel {
            background: #111128;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-header {
            color: #4fc3f7;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a4a;
        }

        label {
            display: block;
            color: #8888aa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            color: #c8c8d4;
            padding: 8px 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            border-radius: 3px;
            width: 100%;
            margin-bottom: 12px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 5px rgba(79, 195, 247, 0.2);
        }

        button, .btn {
            background: linear-gradient(135deg, #1a3a5c 0%, #0d2240 100%);
            color: #4fc3f7;
            border: 1px solid #2a4a6a;
            padding: 10px 24px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        button:hover, .btn:hover {
            background: linear-gradient(135deg, #2a4a6c 0%, #1d3250 100%);
            border-color: #4fc3f7;
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 11px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #5c1a1a 0%, #401010 100%);
            color: #ef5350;
            border-color: #6a2a2a;
        }
        .btn-danger:hover {
            border-color: #ef5350;
        }

        .btn-success {
            background: linear-gradient(135deg, #1a5c3a 0%, #0d4020 100%);
            color: #66bb6a;
            border-color: #2a6a4a;
        }
        .btn-success:hover {
            border-color: #66bb6a;
        }

        .error-box {
            background: #1a0a0a;
            border: 1px solid #5c2a2a;
            color: #ef5350;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            font-size: 13px;
        }

        .isk-value {
            color: #ffd54f;
            font-weight: bold;
        }

        .volume-value {
            color: #80cbc4;
        }

        .feed-row {
            color: #666688;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: #8888aa;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid #2a2a4a;
            font-weight: normal;
        }

        th.right, td.right {
            text-align: right;
        }

        td {
            padding: 6px 10px;
            border-bottom: 1px solid #1a1a2e;
        }

        tr:hover {
            background: #151530;
        }

        .form-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .form-row > div {
            flex: 1;
        }

        .form-row .narrow {
            flex: 0 0 120px;
        }

        .form-row .action {
            flex: 0 0 auto;
            padding-bottom: 12px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #c8c8d4;
            text-transform: none;
            font-size: 13px;
            letter-spacing: 0;
        }

        input[type="radio"] {
            accent-color: #4fc3f7;
        }

        .dynamic-section {
            margin-bottom: 15px;
        }

        .dynamic-item {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .dynamic-item > div {
            flex: 1;
        }

        .dynamic-item .narrow {
            flex: 0 0 100px;
        }

        .dynamic-item .action {
            flex: 0 0 auto;
            padding-bottom: 12px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
        }

        .summary-card .value {
            font-size: 20px;
            color: #ffd54f;
            margin-bottom: 5px;
        }

        .summary-card .label {
            font-size: 11px;
            color: #8888aa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .processing-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 26, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .processing-overlay.active {
            display: flex;
        }

        .processing-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a4a;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .processing-text {
            color: #4fc3f7;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .processing-subtext {
            color: #8888aa;
            font-size: 12px;
            margin-top: 8px;
        }

        footer {
            text-align: center;
            color: #444466;
            font-size: 11px;
            padding: 30px 0 15px;
            border-top: 1px solid #1a1a2e;
            margin-top: 40px;
        }
        footer a.coffee-link {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 16px;
            background: #ffdd00;
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }
        footer a.coffee-link:hover {
            background: #ffcc00;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>// EVE PI Optimizer</h1>
            <nav>
                <a href="/">Optimizer</a>
                <a href="/template-converter">Template Converter</a>
            </nav>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        EVE PI Optimizer &mdash; Not affiliated with CCP Games
        <br>
        <a href="https://buymeacoffee.com/vapesky" target="_blank" class="coffee-link">Buy Me a Coffee</a>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
